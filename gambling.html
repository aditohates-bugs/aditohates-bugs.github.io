<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="game.css">
    <title>Lucky spin</title>
</head>
<body>
    <div id="wheelOfMisery">
        <div id="-1"><h1>- 1 hearts</h1></div>
        <div id="-2"><h1>- 2 hearts</h1></div>
        <div id="-3"><h1>- 3 hearts</h1></div>
        <div id="-4"><h1>- 4 hearts</h1></div>
        <div id="-5"><h1>- 5 hearts</h1></div>
        <div id="-6"><h1>- 6 hearts</h1></div>
    </div>
    <div id="wheelOfFortune">
        <div id="+1"><h1>+ 1 hearts</h1></div>
        <div id="+2"><h1>+ 2 hearts</h1></div>
        <div id="+3"><h1>+ 3 hearts</h1></div>
        <div id="+4"><h1>+ 4 hearts</h1></div>
        <div id="+5"><h1>+ 5 hearts</h1></div>
        <div id="+6"><h1>+ 5.5 hearts</h1></div>
    </div>
</body>
</html>
